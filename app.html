function buildForecast() {
  const el = g('forecast-chart');
  const tbl = g('forecast-table');
  const ins = g('forecast-insight')?.querySelector('.ai-txt');
  if (!el) return;
  if (S.snapshots.length < 2) {
    el.innerHTML = '<div style="font-size:12px;color:var(--text3);padding:20px 0;text-align:center">Add at least 2 months of MRR data to forecast</div>';
    return;
  }

  const model = g('fc-model')?.value || 'compound';
  const snaps = S.snapshots.slice(-6);
  const lastMRR = snaps[snaps.length-1].mrr || 0;
  const prevMRR = snaps[snaps.length-2].mrr || 0;
  const growthRate = prevMRR > 0 ? (lastMRR - prevMRR) / prevMRR : 0.15;
  const adjRate = model === 'conservative' ? growthRate * 0.5 : model === 'linear' ? Math.min(growthRate, 0.1) : growthRate;

  const mos = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const now = new Date();

  // Project 6 months forward
  const projected = [];
  for (let i = 1; i <= 6; i++) {
    const m = (now.getMonth() + i) % 12;
    const y = now.getFullYear() + Math.floor((now.getMonth() + i) / 12);
    const mrr = model === 'linear' ? lastMRR + (lastMRR * adjRate * i) : lastMRR * Math.pow(1 + adjRate, i);
    projected.push({ month: `${mos[m]} ${y}`, mrr: parseFloat(mrr.toFixed(1)) });
  }

  // Chart
  const all = [...snaps, ...projected];
  const maxMRR = Math.max(...all.map(s=>s.mrr||0), 1);
  el.innerHTML = `
    <div style="display:flex;align-items:flex-end;gap:4px;height:100px;margin-bottom:8px">
      ${snaps.map(s=>{const h=Math.round(((s.mrr||0)/maxMRR)*90);const mo=mos[parseInt(s.month.split('-')[1])-1];return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;height:100%;justify-content:flex-end"><div style="width:100%;height:${h}%;background:rgba(0,229,160,.65);border-radius:3px 3px 0 0"></div><div style="font-size:9px;color:var(--text3);font-family:var(--mono);margin-top:4px">${mo}</div></div>`;}).join('')}
      <div style="width:1px;background:var(--border2);height:100%;flex-shrink:0"></div>
      ${projected.map(s=>{const h=Math.round((s.mrr/maxMRR)*90);const mo=s.month.split(' ')[0];return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;height:100%;justify-content:flex-end"><div style="width:100%;height:${h}%;background:rgba(0,153,255,.4);border-radius:3px 3px 0 0;border:1px dashed rgba(0,153,255,.6)"></div><div style="font-size:9px;color:var(--accent2);font-family:var(--mono);margin-top:4px">${mo}</div></div>`;}).join('')}
    </div>
    <div style="display:flex;gap:16px;margin-top:8px">
      <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)"><div style="width:9px;height:9px;background:rgba(0,229,160,.65);border-radius:2px"></div>Actual</div>
      <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--accent2)"><div style="width:9px;height:9px;background:rgba(0,153,255,.4);border:1px dashed rgba(0,153,255,.6);border-radius:2px"></div>Projected</div>
    </div>`;

  // Table
  tbl.innerHTML = `
    <div style="overflow-x:auto;margin-top:14px">
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr style="border-bottom:1px solid var(--border2)">
          ${projected.map(p=>`<th style="text-align:right;padding:8px 6px;font-family:var(--mono);font-size:10px;color:var(--text3)">${p.month}</th>`).join('')}
        </tr></thead>
        <tbody>
          <tr style="border-bottom:1px solid var(--border)">
            ${projected.map(p=>`<td style="text-align:right;padding:8px 6px;font-family:var(--mono);font-weight:700;color:var(--accent2)">₹${p.mrr}L</td>`).join('')}
          </tr>
          <tr>
            ${projected.map((p,i)=>{const prev=i===0?lastMRR:projected[i-1].mrr;const g2=((p.mrr-prev)/prev*100).toFixed(0);return`<td style="text-align:right;padding:4px 6px;font-family:var(--mono);font-size:10px;color:var(--accent)">+${g2}%</td>`;}).join('')}
          </tr>
        </tbody>
      </table>
    </div>`;

  // Insight
  const arr6 = projected[5].mrr * 12;
  if (ins) ins.innerHTML = `At current <strong>${(growthRate*100).toFixed(0)}% MoM growth</strong> (${model} model), you'll reach <strong>₹${projected[5].mrr}L MRR</strong> in 6 months — that's <strong>₹${arr6.toFixed(0)}L ARR</strong>. ${arr6 > 100 ? 'Series A territory! 🎯' : 'Keep pushing growth to hit Series A metrics.'}`;
}

            <td style="padding:10px 0;font-weight:700">Total</td><td></td>
            <td style="text-align:right;padding:10px 6px;font-family:var(--mono);font-weight:700">${totalShares.toLocaleString()}</td>
            <td style="text-align:right;padding:10px 6px;font-family:var(--mono);font-weight:700;color:var(--accent)">100%</td>
            <td style="text-align:right;padding:10px 0;font-family:var(--mono);font-weight:700">₹${capTable.reduce((a,s)=>a+s.invest,0).toFixed(1)}L</td>
            <td></td>
          </tr>
        </tbody>
      </table>
    </div>`;
  sumEl.style.display = 'block';
}

function removeShareholder(id) {
  capTable = capTable.filter(s=>s.id!==id);
  localStorage.setItem('cfo_captable', JSON.stringify(capTable));
  renderCapTable();
}

function calcDilution() {
  const amount = parseFloat(g('dilute-amount')?.value)||0;
  const val    = parseFloat(g('dilute-val')?.value)||0;
  if (!amount || !val || !capTable.length) return;
  const postMoney = val + amount;
  const newPct    = (amount/postMoney*100).toFixed(2);
  const existingPct = 100 - parseFloat(newPct);
  const dilutionFactor = existingPct / 100;
  const totalShares = capTable.reduce((a,s)=>a+s.shares,0);
  const newShares   = Math.round(totalShares * parseFloat(newPct) / existingPct);

  g('dilution-result').innerHTML = `
    <div style="font-size:11px;font-family:var(--mono);color:var(--text3);margin-bottom:10px">POST INVESTMENT OWNERSHIP</div>
    <div style="display:flex;flex-direction:column;gap:6px">
      <div style="display:flex;justify-content:space-between;font-size:12px;padding:6px 0;border-bottom:1px solid var(--border)"><span style="color:var(--text2)">New Investor</span><span style="font-family:var(--mono);font-weight:700;color:var(--accent2)">${newPct}%</span></div>
      ${capTable.map(s=>{const currPct=(s.shares/totalShares*100);const newP=(currPct*dilutionFactor).toFixed(2);return`<div style="display:flex;justify-content:space-between;font-size:12px;padding:6px 0;border-bottom:1px solid var(--border)"><span style="color:var(--text2)">${s.name}</span><span style="font-family:var(--mono);font-weight:600;color:var(--accent)">${newP}% <span style="color:var(--text3);font-size:10px">(was ${currPct.toFixed(2)}%)</span></span></div>`;}).join('')}
      <div style="padding:8px;background:rgba(0,229,160,.06);border-radius:8px;margin-top:6px;font-size:12px;color:var(--text2)">Pre-money: ₹${val}Cr · Post-money: ₹${postMoney}Cr · New shares: ${newShares.toLocaleString()}</div>
    </div>`;
}

// ══════════════════════════════════════
// INDUSTRY BENCHMARKS
// ══════════════════════════════════════
function buildBenchmarks() {
  const el = g('benchmark-content');
  if (!el) return;
  const L = S.snapshots.length ? S.snapshots[S.snapshots.length-1] : null;

  const benchmarks = [
    { metric:'MoM Revenue Growth', yours: L && S.snapshots.length>1 ? (((L.mrr-S.snapshots[S.snapshots.length-2].mrr)/S.snapshots[S.snapshots.length-2].mrr)*100).toFixed(0)+'%' : '—', seed:'10-20%', seriesA:'15-25%', note:'Top quartile Indian SaaS: 20%+' },
    { metric:'Gross Margin', yours: L?.mrr&&L?.burn ? (((L.mrr-(L.mrr*0.25))/L.mrr)*100).toFixed(0)+'%' : '—', seed:'60-70%', seriesA:'70-80%', note:'SaaS benchmark: 70%+ for Series A' },
    { metric:'Net Revenue Retention', yours: L?.nrr ? L.nrr+'%' : '—', seed:'90-95%', seriesA:'100-110%', note:'Best-in-class: 120%+' },
    { metric:'Burn Multiple', yours: L?.mrr&&L?.burn&&S.snapshots.length>1 ? ((L.burn-L.mrr)/(L.mrr-S.snapshots[S.snapshots.length-2].mrr||1)).toFixed(1)+'x' : '—', seed:'<2x', seriesA:'<1.5x', note:'Lower is better. <1x is excellent.' },
    { metric:'Runway', yours: L?.burn>0 ? (L.cash*100/L.burn).toFixed(0)+' months' : '—', seed:'12-18 mo', seriesA:'18-24 mo', note:'Raise when you have 12+ months' },
    { metric:'Headcount Efficiency', yours: L?.mrr&&L?.headcount ? '₹'+(L.mrr/L.headcount).toFixed(1)+'L/person' : '—', seed:'₹1-3L/person', seriesA:'₹3-6L/person', note:'Revenue per employee' },
  ];

  el.innerHTML = `
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr style="border-bottom:2px solid var(--border2)">
          <th style="text-align:left;padding:10px 0;font-family:var(--mono);font-size:10px;color:var(--text3)">METRIC</th>
          <th style="text-align:center;padding:10px 6px;font-family:var(--mono);font-size:10px;color:var(--accent)">YOURS</th>
          <th style="text-align:center;padding:10px 6px;font-family:var(--mono);font-size:10px;color:var(--accent2)">SEED BENCH.</th>
          <th style="text-align:center;padding:10px 6px;font-family:var(--mono);font-size:10px;color:var(--accent4)">SERIES A</th>
          <th style="text-align:left;padding:10px 0;font-family:var(--mono);font-size:10px;color:var(--text3)">NOTE</th>
        </tr></thead>
        <tbody>
          ${benchmarks.map(b=>`
            <tr style="border-bottom:1px solid var(--border)">
              <td style="padding:10px 0;font-weight:600">${b.metric}</td>
              <td style="text-align:center;padding:10px 6px;font-family:var(--mono);font-weight:700;color:var(--accent)">${b.yours}</td>
              <td style="text-align:center;padding:10px 6px;font-family:var(--mono);color:var(--accent2)">${b.seed}</td>
              <td style="text-align:center;padding:10px 6px;font-family:var(--mono);color:var(--accent4)">${b.seriesA}</td>
              <td style="padding:10px 0;font-size:11px;color:var(--text3)">${b.note}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div class="aibox" style="margin-top:16px"><div class="ai-icon">✦</div><div class="ai-txt">${L ? `Based on your data — focus on growing NRR above 100% and maintaining burn multiple below 1.5x. These two metrics matter most to Indian Series A investors.` : 'Add your financial data to see how you compare against Indian SaaS benchmarks.'}</div></div>`;
}

// ══════════════════════════════════════
// PAYROLL ENGINE
// ══════════════════════════════════════
let employees = JSON.parse(localStorage.getItem('cfo_employees')||'[]');

function addEmployee() {
  const name   = g('emp-name')?.value?.trim();
  const salary = parseFloat(g('emp-salary')?.value)||0;
  const role   = g('emp-role')?.value?.trim()||'Employee';
  const pfElig = g('emp-pf')?.value === 'yes';
  if (!name || !salary) { showToast('⚠️ Enter name and salary', true); return; }
  employees.push({ id:Date.now(), name, salary, role, pfElig });
  localStorage.setItem('cfo_employees', JSON.stringify(employees));
  ['emp-name','emp-salary','emp-role'].forEach(id=>{ const el=g(id); if(el)el.value=''; });
  renderPayroll();
  logAudit('Employee Added', `${name} — ₹${salary.toLocaleString()}/mo`);
  showToast(`✅ ${name} added to payroll`);
}

function renderPayroll() {
  const el = g('payroll-table');
  const sumEl = g('payroll-summary');
  if (!el) return;
  if (!employees.length) { el.innerHTML='<div style="font-size:12px;color:var(--text3);padding:10px 0">Add employees above to calculate payroll</div>'; if(sumEl)sumEl.style.display='none'; return; }

  let totalGross=0, totalPF=0, totalESI=0;
  const rows = employees.map(e => {
    const basic = Math.min(e.salary * 0.4, 15000);
    const pf    = e.pfElig ? Math.round(basic * 0.12) : 0;
    const esi   = e.salary <= 21000 ? Math.round(e.salary * 0.0325) : 0;
    const tds   = e.salary > 50000 ? Math.round((e.salary - 50000) * 0.1 / 12) : 0;
    const net   = e.salary - tds;
    const ctc   = e.salary + pf + esi;
    totalGross += e.salary; totalPF += pf; totalESI += esi;
    return { ...e, basic, pf, esi, tds, net, ctc };
  });

  el.innerHTML = `
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr style="border-bottom:1px solid var(--border2)">
          <th style="text-align:left;padding:8px 0;font-family:var(--mono);font-size:10px;color:var(--text3)">EMPLOYEE</th>
          <th style="text-align:right;padding:8px 6px;font-family:var(--mono);font-size:10px;color:var(--text3)">GROSS</th>
          <th style="text-align:right;padding:8px 6px;font-family:var(--mono);font-size:10px;color:var(--accent2)">PF</th>
          <th style="text-align:right;padding:8px 6px;font-family:var(--mono);font-size:10px;color:var(--accent4)">ESI</th>
          <th style="text-align:right;padding:8px 6px;font-family:var(--mono);font-size:10px;color:var(--accent3)">TDS</th>
          <th style="text-align:right;padding:8px 6px;font-family:var(--mono);font-size:10px;color:var(--accent)">NET PAY</th>
          <th style="text-align:right;padding:8px 0;font-family:var(--mono);font-size:10px;color:var(--red)">CTC</th>
          <th></th>
        </tr></thead>
        <tbody>
          ${rows.map(r=>`<tr style="border-bottom:1px solid var(--border)">
            <td style="padding:9px 0"><div style="font-weight:600">${r.name}</div><div style="font-size:10px;color:var(--text3);font-family:var(--mono)">${r.role}</div></td>
            <td style="text-align:right;padding:9px 6px;font-family:var(--mono)">₹${r.salary.toLocaleString()}</td>
            <td style="text-align:right;padding:9px 6px;font-family:var(--mono);color:var(--accent2)">${r.pf>0?'₹'+r.pf.toLocaleString():'—'}</td>
            <td style="text-align:right;padding:9px 6px;font-family:var(--mono);color:var(--accent4)">${r.esi>0?'₹'+r.esi.toLocaleString():'—'}</td>
            <td style="text-align:right;padding:9px 6px;font-family:var(--mono);color:var(--accent3)">${r.tds>0?'₹'+r.tds.toLocaleString():'—'}</td>
            <td style="text-align:right;padding:9px 6px;font-family:var(--mono);font-weight:600;color:var(--accent)">₹${r.net.toLocaleString()}</td>
            <td style="text-align:right;padding:9px 0;font-family:var(--mono);font-weight:600;color:var(--red)">₹${r.ctc.toLocaleString()}</td>
            <td style="padding:9px 0 9px 8px"><button onclick="removeEmployee(${r.id})" style="background:none;border:none;color:var(--text3);cursor:pointer">✕</button></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;

  const totalCTC = totalGross + totalPF + totalESI;
  if (sumEl) {
    sumEl.style.display = 'block';
    setText('pr-gross', '₹'+totalGross.toLocaleString());
    setText('pr-pf',    '₹'+totalPF.toLocaleString());
    setText('pr-esi',   '₹'+totalESI.toLocaleString());
    setText('pr-net',   '₹'+totalCTC.toLocaleString());
  }
}

function removeEmployee(id) {
  employees = employees.filter(e=>e.id!==id);
  localStorage.setItem('cfo_employees', JSON.stringify(employees));
  renderPayroll();
}

const PAGE_TITLES_EXTRA = { financials:'Financials', analytics:'Analytics' };
Object.assign(PAGE_TITLES, PAGE_TITLES_EXTRA);

// Hook into navTo to build pages on demand
const _origNavTo = navTo;

// ══════════════════════════════════════
// OVERRIDE navTo to build pages on demand
// ══════════════════════════════════════
function navTo(id, el) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  g('page-'+id)?.classList.add('active');
  document.querySelectorAll('.sb-item').forEach(i=>i.classList.remove('active'));
  g('snav-'+id)?.classList.add('active');
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));
  g('mnav-'+id)?.classList.add('active');
  setText('topbar-title', PAGE_TITLES[id]||id);
  window.scrollTo(0,0);

  // Build pages on demand
  if (id === 'financials') { buildPL(); buildBalanceSheet(); buildCashFlow(); renderPayroll(); }
  if (id === 'analytics')  { calcUnitEco(); buildForecast(); renderCapTable(); buildBenchmarks(); renderAuditLog(); }
}

// START
init();
</script>
