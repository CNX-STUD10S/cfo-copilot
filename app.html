<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFO Copilot — App</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#04070D;--bg2:#080D16;--bg3:#0D1420;--bg4:#121A28;
  --border:#152030;--border2:#1E2E42;
  --accent:#00E5A0;--accent2:#0099FF;--accent3:#FF6B35;--accent4:#FFD700;
  --purple:#8B5CF6;--text:#ECF0F8;--text2:#8B9AB0;--text3:#3A4F66;--red:#FF4560;
  --font:'Syne',sans-serif;--mono:'JetBrains Mono',monospace;
  --sidebar:224px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden;}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:9997;opacity:.5;}
.app-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,160,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,160,.018) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}
.glow{position:fixed;border-radius:50%;filter:blur(130px);pointer-events:none;z-index:0;animation:orbdrift 10s ease-in-out infinite;}
.g1{width:700px;height:700px;background:rgba(0,229,160,0.045);top:-250px;right:-200px;animation-delay:0s;}
.g2{width:550px;height:550px;background:rgba(0,153,255,0.03);bottom:-150px;left:-150px;animation-delay:-5s;}
.g3{width:400px;height:400px;background:rgba(139,92,246,0.025);top:35%;left:15%;animation-delay:-2.5s;}
@keyframes orbdrift{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(20px,-30px) scale(1.04)}}
#loading{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
.load-ring{width:64px;height:64px;position:relative;}
.load-ring::before,.load-ring::after{content:'';position:absolute;inset:0;border-radius:50%;}
.load-ring::before{border:2px solid var(--border2);}
.load-ring::after{border:2px solid transparent;border-top-color:var(--accent);animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.load-icon-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:var(--accent);}
.load-txt{font-size:11px;color:var(--text3);font-family:var(--mono);letter-spacing:.14em;animation:loadfade 1.5s ease infinite;}
@keyframes loadfade{0%,100%{opacity:.4}50%{opacity:1}}
.screen{display:none;min-height:100vh;position:relative;z-index:1;}
.screen.active{display:flex;}
.auth-screen{flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;min-height:100vh;}
.auth-card{width:100%;max-width:420px;background:rgba(8,13,22,.95);border:1px solid var(--border2);border-radius:24px;padding:38px 32px;position:relative;overflow:hidden;box-shadow:0 32px 100px rgba(0,0,0,.7),0 0 0 1px rgba(0,229,160,.04);}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent);}
.auth-card::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse 300px 200px at 50% 0%,rgba(0,229,160,.04),transparent);pointer-events:none;}
.a-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;}
.a-logo-icon{width:36px;height:36px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#000;box-shadow:0 0 20px rgba(0,229,160,.3);}
.a-logo-name{font-size:16px;font-weight:700;}
.a-title{font-size:26px;font-weight:800;margin-bottom:8px;letter-spacing:-.02em;line-height:1.2;}
.a-sub{font-size:13px;color:var(--text2);margin-bottom:28px;line-height:1.7;}
.a-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:14px 16px;font-size:15px;color:var(--text);font-family:var(--font);outline:none;transition:all .2s;margin-bottom:12px;display:block;}
.a-input:focus{border-color:rgba(0,229,160,.5);background:rgba(0,229,160,.02);box-shadow:0 0 0 3px rgba(0,229,160,.07);}
.a-input::placeholder{color:var(--text3);font-size:13px;}
.a-btn{width:100%;background:var(--accent);color:#000;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;}
.a-btn:hover{background:#00ffb3;transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,229,160,.35);}
.a-btn.loading{opacity:.7;pointer-events:none;}
.a-btn-ghost{width:100%;background:rgba(13,20,32,.8);color:var(--text2);border:1px solid var(--border2);border-radius:12px;padding:13px;font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;transition:all .2s;margin-bottom:10px;}
.a-btn-ghost:hover{background:var(--bg4);color:var(--text);}
.a-note{font-size:11px;color:var(--text3);text-align:center;font-family:var(--mono);line-height:1.8;}
.a-note a{color:var(--accent);cursor:pointer;}
.divider{display:flex;align-items:center;gap:12px;margin:14px 0;}
.divider-line{flex:1;height:1px;background:var(--border);}
.divider-text{font-size:11px;color:var(--text3);font-family:var(--mono);}
.ob-screen{flex-direction:column;align-items:center;padding:32px 20px 48px;}
.ob-top{width:100%;max-width:520px;display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;}
.ob-logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700;}
.ob-logo-icon{width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#000;box-shadow:0 0 16px rgba(0,229,160,.3);}
.ob-cnt{font-size:11px;font-family:var(--mono);color:var(--text3);}
.prog-track{display:flex;align-items:center;width:100%;max-width:520px;margin-bottom:8px;}
.pdot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:var(--mono);flex-shrink:0;transition:all .3s;border:2px solid var(--border2);background:var(--bg2);color:var(--text3);}
.pdot.done{background:var(--accent);border-color:var(--accent);color:#000;box-shadow:0 0 12px rgba(0,229,160,.4);}
.pdot.active{background:rgba(0,229,160,.1);border-color:var(--accent);color:var(--accent);}
.pline{flex:1;height:2px;background:var(--border);transition:background .4s;}
.pline.done{background:var(--accent);}
.prog-lbls{display:flex;justify-content:space-between;width:100%;max-width:520px;margin-bottom:22px;}
.plbl{font-size:9px;font-family:var(--mono);color:var(--text3);text-align:center;flex:1;letter-spacing:.04em;}
.plbl.active{color:var(--accent);}
.plbl.done{color:var(--text2);}
.ob-card{width:100%;max-width:520px;background:rgba(8,13,22,.95);border:1px solid var(--border2);border-radius:20px;padding:28px 24px;position:relative;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.5);}
.ob-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));}
.ob-step{display:none;}
.ob-step.active{display:block;animation:fadeInUp .3s ease;}
@keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.ob-h{font-size:22px;font-weight:800;margin-bottom:6px;}
.ob-p{font-size:13px;color:var(--text2);margin-bottom:22px;line-height:1.65;}
.fl{font-size:10px;font-family:var(--mono);color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin:14px 0 6px;}
.fl:first-of-type{margin-top:0;}
.fi{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;font-size:14px;color:var(--text);font-family:var(--font);outline:none;transition:all .2s;display:block;}
.fi:focus{border-color:rgba(0,229,160,.4);box-shadow:0 0 0 3px rgba(0,229,160,.06);}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.sb{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:12px 10px;text-align:center;cursor:pointer;transition:all .2s;}
.sb:hover{border-color:rgba(0,229,160,.3);transform:translateY(-1px);}
.sb.on{border-color:var(--accent);background:rgba(0,229,160,.08);}
.sb-e{font-size:20px;margin-bottom:4px;}
.sb-n{font-size:12px;font-weight:600;}
.sb-s{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:2px;}
.skip{display:block;text-align:center;font-size:12px;color:var(--text3);cursor:pointer;margin-top:10px;}
.app-screen{flex-direction:row;}
.sidebar{width:var(--sidebar);min-width:var(--sidebar);background:rgba(8,13,22,.97);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto;backdrop-filter:blur(20px);}
.sidebar::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(180deg,transparent,rgba(0,229,160,.08),transparent);}
.sb-logo{padding:20px 16px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.sb-logo-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#000;flex-shrink:0;box-shadow:0 0 20px rgba(0,229,160,.25);}
.sb-logo-name{font-size:14px;font-weight:700;}
.sb-nav{flex:1;padding:10px;display:flex;flex-direction:column;gap:1px;}
.sb-section{font-size:9px;font-family:var(--mono);color:var(--text3);letter-spacing:.18em;text-transform:uppercase;padding:14px 10px 6px;}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);border:1px solid transparent;transition:all .15s;position:relative;}
.sb-item:hover{background:rgba(255,255,255,.03);color:var(--text);}
.sb-item.active{background:rgba(0,229,160,.07);color:var(--accent);border-color:rgba(0,229,160,.1);}
.sb-item.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:2px;background:var(--accent);border-radius:0 2px 2px 0;box-shadow:0 0 8px var(--accent);}
.sb-item-icon{font-size:15px;width:20px;text-align:center;}
.sb-badge{margin-left:auto;font-size:9px;font-family:var(--mono);background:rgba(255,69,96,.12);color:var(--red);padding:2px 6px;border-radius:4px;border:1px solid rgba(255,69,96,.2);}
.sb-footer{padding:12px;border-top:1px solid var(--border);}
.sb-user{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .2s;}
.sb-user:hover{background:rgba(255,255,255,.05);}
.sb-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#000;flex-shrink:0;box-shadow:0 0 12px rgba(0,229,160,.2);}
.sb-uname{font-size:12px;font-weight:600;}
.sb-uplan{font-size:10px;color:var(--text3);font-family:var(--mono);}
.main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh;}
.topbar{height:58px;background:rgba(4,7,13,.92);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:12px;position:sticky;top:0;z-index:50;}
.topbar-title{font-size:15px;font-weight:700;flex:1;letter-spacing:-.01em;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);animation:pulse 2s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 10px var(--accent)}50%{opacity:.4;box-shadow:0 0 4px var(--accent)}}
.usage-pill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.04);border:1px solid var(--border2);border-radius:20px;padding:5px 12px;font-size:11px;font-family:var(--mono);color:var(--text2);cursor:pointer;transition:all .15s;}
.usage-pill:hover{border-color:rgba(0,229,160,.3);color:var(--accent);}
.tbar-btn{display:flex;align-items:center;gap:5px;border:none;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:700;font-family:var(--font);cursor:pointer;transition:all .15s;white-space:nowrap;}
.tbar-primary{background:var(--accent);color:#000;box-shadow:0 0 16px rgba(0,229,160,.2);}
.tbar-primary:hover{background:#00ffb3;box-shadow:0 0 28px rgba(0,229,160,.35);transform:translateY(-1px);}
.tbar-ghost{background:rgba(255,255,255,.04);color:var(--text2);border:1px solid var(--border2);}
.tbar-ghost:hover{background:rgba(255,255,255,.07);color:var(--text);}
.page-wrap{padding:28px 32px 48px;flex:1;}
.mobile-hdr{display:none;position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(4,7,13,.94);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);height:56px;padding:0 16px;align-items:center;gap:10px;}
.mh-logo{display:flex;align-items:center;gap:8px;flex:1;}
.mh-logo-icon{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#000;box-shadow:0 0 12px rgba(0,229,160,.25);}
.mh-logo-name{font-size:14px;font-weight:700;}
.mh-right{display:flex;align-items:center;gap:8px;}
.mh-btn{display:flex;align-items:center;gap:5px;background:var(--accent);color:#000;border:none;padding:7px 12px;border-radius:8px;font-size:12px;font-weight:700;font-family:var(--font);cursor:pointer;}
.mh-data-btn{background:rgba(255,255,255,.05);color:var(--text2);border:1px solid var(--border2);font-size:11px;}
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(4,7,13,.97);backdrop-filter:blur(24px);border-top:1px solid var(--border);padding:6px 2px 18px;}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 2px;cursor:pointer;border-radius:10px;transition:all .15s;position:relative;}
.ni.active{background:rgba(0,229,160,.08);}
.ni-icon{font-size:17px;transition:transform .15s;}
.ni.active .ni-icon{transform:scale(1.1);}
.ni-label{font-size:8.5px;font-family:var(--mono);color:var(--text3);text-align:center;}
.ni.active .ni-label{color:var(--accent);}
.ni-dot{position:absolute;top:3px;right:6px;width:6px;height:6px;border-radius:50%;background:var(--red);box-shadow:0 0 6px var(--red);}
.page{display:none;}
.page.active{display:block;animation:fadeInUp .25s ease;}
.stabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:22px;padding-bottom:2px;}
.stabs::-webkit-scrollbar{display:none;}
.stab{white-space:nowrap;padding:7px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:rgba(255,255,255,.03);color:var(--text2);transition:all .15s;font-family:var(--font);}
.stab:hover{border-color:rgba(0,229,160,.2);color:var(--text);}
.stab.active{background:rgba(0,229,160,.08);color:var(--accent);border-color:rgba(0,229,160,.2);}
.subpage{display:none;}
.subpage.active{display:block;animation:fadeInUp .2s ease;}
.ph{margin-bottom:24px;}
.ph-title{font-size:24px;font-weight:800;margin-bottom:4px;letter-spacing:-.02em;}
.ph-sub{font-size:10px;font-family:var(--mono);color:var(--text3);letter-spacing:.12em;}
.mg4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.mg2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.mc{background:rgba(8,13,22,.9);border:1px solid var(--border);border-radius:14px;padding:18px 16px;position:relative;overflow:hidden;transition:all .2s;}
.mc::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 120% 80% at 50% 0%,rgba(0,229,160,.025),transparent);pointer-events:none;}
.mc:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,.3);}
.mc-val{font-size:26px;font-weight:800;line-height:1;margin-bottom:6px;letter-spacing:-.02em;}
.mc-label{font-size:9px;color:var(--text3);font-family:var(--mono);letter-spacing:.12em;text-transform:uppercase;}
.mc-change{font-size:10px;font-family:var(--mono);margin-top:5px;}
.card{background:rgba(8,13,22,.9);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;position:relative;overflow:hidden;transition:border-color .2s;}
.card::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 200% 100% at 50% 0%,rgba(0,229,160,.015),transparent);pointer-events:none;}
.card:hover{border-color:var(--border2);}
.ctop{position:absolute;top:0;left:0;right:0;height:2px;}
.clabel{font-size:10px;font-family:var(--mono);color:var(--text3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px;}
.tag{display:inline-flex;align-items:center;font-size:10px;font-family:var(--mono);padding:3px 9px;border-radius:5px;font-weight:500;}
.tg{background:rgba(0,229,160,.1);color:var(--accent);border:1px solid rgba(0,229,160,.15);}
.tr{background:rgba(255,69,96,.1);color:var(--red);border:1px solid rgba(255,69,96,.15);}
.tb{background:rgba(0,153,255,.1);color:var(--accent2);border:1px solid rgba(0,153,255,.15);}
.ty{background:rgba(255,215,0,.1);color:var(--accent4);border:1px solid rgba(255,215,0,.15);}
.tp{background:rgba(139,92,246,.1);color:var(--purple);border:1px solid rgba(139,92,246,.15);}
.aibox{background:linear-gradient(135deg,rgba(0,229,160,.055),rgba(0,153,255,.035));border:1px solid rgba(0,229,160,.15);border-radius:12px;padding:14px;margin-top:14px;display:flex;gap:10px;position:relative;overflow:hidden;}
.aibox::before{content:'';position:absolute;top:-1px;left:20px;right:20px;height:1px;background:linear-gradient(90deg,transparent,rgba(0,229,160,.4),transparent);}
.ai-icon{width:26px;height:26px;background:rgba(0,229,160,.15);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;border:1px solid rgba(0,229,160,.15);}
.ai-txt{font-size:12px;line-height:1.7;color:var(--text2);}
.ai-txt strong{color:var(--accent);}
.chartbar{display:flex;align-items:flex-end;gap:5px;height:88px;margin:14px 0;}
.cbar-g{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;height:100%;justify-content:flex-end;}
.cbar{width:100%;border-radius:4px 4px 0 0;cursor:pointer;transition:filter .15s;}
.cbar:hover{filter:brightness(1.3);}
.cbar-l{font-size:9px;color:var(--text3);font-family:var(--mono);margin-top:4px;}
.pw{margin:10px 0;}
.pl{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:6px;font-family:var(--mono);}
.pb{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.pf{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent2),var(--accent));transition:width .6s ease;}
.ring-wrap{position:relative;flex-shrink:0;}
.ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-num{font-size:24px;font-weight:800;}
.ring-sub{font-size:9px;color:var(--text3);font-family:var(--mono);}
.trow{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
.trow:last-child{border-bottom:none;}
.ci{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:all .15s;}
.ci:last-child{border-bottom:none;}
.ci:hover{padding-left:6px;}
.ci-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.ci-info{flex:1;}
.ci-name{font-size:13px;font-weight:600;margin-bottom:2px;}
.ci-due{font-size:11px;color:var(--text3);font-family:var(--mono);}
.ci-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;}
.sw{margin:8px 0 18px;}
.sl-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:8px;font-family:var(--mono);}
input[type=range]{-webkit-appearance:none;width:100%;height:3px;border-radius:2px;background:var(--border2);outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 12px rgba(0,229,160,.5);transition:transform .15s;}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.15);}
.sresult{background:rgba(8,13,22,.8);border:1px solid var(--border);border-radius:12px;padding:16px;}
.sr{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);}
.sr:last-child{border-bottom:none;}
.sr-label{color:var(--text2);font-size:12px;}
.sr-val{font-family:var(--mono);font-weight:700;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;border:none;transition:all .15s;}
.btn-full{width:100%;}
.bp{background:var(--accent);color:#000;box-shadow:0 0 16px rgba(0,229,160,.12);}
.bp:hover{background:#00ffb3;box-shadow:0 0 24px rgba(0,229,160,.3);transform:translateY(-1px);}
.bgb{background:rgba(255,255,255,.04);color:var(--text2);border:1px solid var(--border2);}
.bgb:hover{background:rgba(255,255,255,.07);color:var(--text);}
.limit-banner{background:rgba(255,107,53,.07);border:1px solid rgba(255,107,53,.2);border-radius:12px;padding:14px;margin-bottom:16px;display:none;}
.limit-banner.show{display:block;}
.si{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:all .15s;}
.si:last-child{border-bottom:none;}
.si:hover{padding-left:6px;}
.si-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.si-info{flex:1;}
.si-name{font-size:13px;font-weight:600;margin-bottom:2px;}
.si-desc{font-size:11px;color:var(--text3);font-family:var(--mono);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:none;align-items:flex-end;backdrop-filter:blur(8px);}
.modal-overlay.open{display:flex;animation:fadeInModal .2s ease;}
@keyframes fadeInModal{from{opacity:0}to{opacity:1}}
.modal-box{width:100%;max-height:92vh;background:rgba(8,13,22,.98);border-radius:20px 20px 0 0;border-top:1px solid var(--border2);display:flex;flex-direction:column;animation:slideUp .3s cubic-bezier(.16,1,.3,1);overflow:hidden;box-shadow:0 -20px 80px rgba(0,0,0,.5);}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mhdr{padding:18px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px;flex-shrink:0;background:rgba(8,13,22,.98);position:sticky;top:0;z-index:10;}
.mhdr::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);}
.mhdr-title{font-size:16px;font-weight:700;margin-bottom:2px;}
.mhdr-sub{font-size:11px;color:var(--text3);font-family:var(--mono);}
.mclose{width:30px;height:30px;background:rgba(255,255,255,.06);border:none;border-radius:50%;color:var(--text2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:auto;transition:all .15s;}
.mclose:hover{background:rgba(255,69,96,.15);color:var(--red);}
.mbody{overflow-y:auto;padding:18px 20px;flex:1;}
.mbody::-webkit-scrollbar{width:3px;}
.mbody::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.de-sec{font-size:10px;font-family:var(--mono);color:var(--accent);letter-spacing:.12em;text-transform:uppercase;padding:14px 0 8px;border-bottom:1px solid var(--border);margin-bottom:14px;}
.de-lbl{font-size:11px;font-family:var(--mono);color:var(--text3);letter-spacing:.06em;margin-bottom:7px;}
.de-row{display:flex;gap:10px;margin-bottom:14px;}
.de-field{flex:1;}
.de-inp{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:11px 13px;font-size:14px;color:var(--text);font-family:var(--font);outline:none;transition:all .2s;-webkit-appearance:none;}
.de-inp:focus{border-color:rgba(0,229,160,.4);box-shadow:0 0 0 3px rgba(0,229,160,.06);}
.de-wrap{display:flex;align-items:center;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;overflow:hidden;transition:all .2s;}
.de-wrap:focus-within{border-color:rgba(0,229,160,.4);box-shadow:0 0 0 3px rgba(0,229,160,.06);}
.de-pre{padding:0 6px 0 12px;font-size:12px;color:var(--text3);font-family:var(--mono);flex-shrink:0;}
.de-suf{padding:0 12px 0 4px;font-size:10px;color:var(--text3);font-family:var(--mono);flex-shrink:0;white-space:nowrap;}
.de-num{border:none;border-radius:0;background:transparent;padding:11px 4px;flex:1;min-width:0;font-size:14px;color:var(--text);font-family:var(--font);outline:none;}
.de-preview{background:linear-gradient(135deg,rgba(0,229,160,.05),rgba(0,153,255,.04));border:1px solid rgba(0,229,160,.15);border-radius:12px;padding:14px;margin:14px 0;}
.de-btn{width:100%;background:var(--accent);color:#000;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;}
.de-btn:hover{background:#00ffb3;transform:translateY(-1px);box-shadow:0 6px 24px rgba(0,229,160,.3);}
.de-btn.sec{background:rgba(255,255,255,.04);color:var(--text2);border:1px solid var(--border2);}
.de-btn.sec:hover{background:rgba(255,255,255,.07);transform:none;box-shadow:none;}
.de-btn.loading{opacity:.7;pointer-events:none;}
.upload-zone{border:2px dashed var(--border2);border-radius:14px;padding:36px 20px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:14px;position:relative;background:rgba(255,255,255,.01);}
.upload-zone:hover,.upload-zone.drag{border-color:rgba(0,229,160,.4);background:rgba(0,229,160,.03);}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;}
.plan-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-top:14px;}
.plan-card{background:rgba(8,13,22,.9);border:1px solid var(--border2);border-radius:14px;padding:18px;position:relative;transition:all .2s;}
.plan-card:hover{transform:translateY(-3px);}
.plan-card.feat{border-color:rgba(0,229,160,.2);background:linear-gradient(135deg,rgba(0,229,160,.05),rgba(8,13,22,.9));}
.plan-popular{position:absolute;top:-11px;left:50%;transform:translateX(-50%);background:var(--accent);color:#000;font-size:9px;font-weight:700;padding:3px 12px;border-radius:100px;white-space:nowrap;font-family:var(--mono);}
.plan-name{font-size:9px;font-family:var(--mono);color:var(--text3);letter-spacing:.12em;margin-bottom:8px;}
.plan-price{font-size:26px;font-weight:800;margin-bottom:2px;}
.plan-period{font-size:11px;color:var(--text3);font-family:var(--mono);margin-bottom:14px;}
.plan-feat{display:flex;gap:7px;font-size:12px;color:var(--text2);margin-bottom:7px;}
.plan-check{color:var(--accent);font-size:11px;flex-shrink:0;}
.plan-btn{width:100%;padding:10px;border-radius:8px;font-size:12px;font-weight:700;font-family:var(--font);cursor:pointer;border:none;margin-top:14px;}
.chat-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;align-items:flex-end;backdrop-filter:blur(6px);}
.chat-overlay.open{display:flex;}
.chat-drawer{width:100%;max-height:90vh;background:rgba(8,13,22,.98);border-radius:20px 20px 0 0;border-top:1px solid var(--border2);display:flex;flex-direction:column;animation:slideUp .3s cubic-bezier(.16,1,.3,1);box-shadow:0 -20px 80px rgba(0,0,0,.5);}
.chat-hdr{padding:16px 18px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;position:relative;}
.chat-hdr::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent);}
.chat-title{font-size:15px;font-weight:700;flex:1;}
.chat-close{width:28px;height:28px;background:rgba(255,255,255,.06);border:none;border-radius:50%;color:var(--text2);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.chat-close:hover{background:rgba(255,69,96,.15);color:var(--red);}
.chat-msgs{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:12px;min-height:200px;}
.chat-msgs::-webkit-scrollbar{width:3px;}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.cmsg{max-width:85%;padding:11px 15px;border-radius:14px;font-size:13px;line-height:1.65;}
.cmsg.ai{background:rgba(255,255,255,.04);border:1px solid var(--border);align-self:flex-start;border-radius:4px 14px 14px 14px;animation:fadeInUp .2s ease;}
.cmsg.user{background:rgba(0,229,160,.08);border:1px solid rgba(0,229,160,.15);color:var(--accent);align-self:flex-end;border-radius:14px 4px 14px 14px;animation:fadeInUp .2s ease;}
.cmsg strong{color:var(--accent);}
.chat-chips{padding:0 16px 10px;display:flex;gap:7px;overflow-x:auto;flex-shrink:0;}
.chat-chips::-webkit-scrollbar{display:none;}
.chip{white-space:nowrap;background:rgba(255,255,255,.04);border:1px solid var(--border2);border-radius:20px;padding:6px 12px;font-size:11px;color:var(--text2);cursor:pointer;font-family:var(--font);flex-shrink:0;transition:all .15s;}
.chip:hover{border-color:rgba(0,229,160,.3);color:var(--accent);}
.chat-input-wrap{padding:10px 16px 18px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;}
.chat-input{flex:1;background:rgba(255,255,255,.04);border:1px solid var(--border2);border-radius:12px;padding:11px 16px;font-size:13px;color:var(--text);font-family:var(--font);outline:none;transition:all .2s;}
.chat-input:focus{border-color:rgba(0,229,160,.3);background:rgba(0,229,160,.02);}
.chat-send{width:42px;height:42px;background:var(--accent);border:none;border-radius:12px;color:#000;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;box-shadow:0 0 16px rgba(0,229,160,.2);}
.chat-send:hover{background:#00ffb3;box-shadow:0 0 24px rgba(0,229,160,.4);}
.chat-send:disabled{opacity:.4;pointer-events:none;}
.typing{display:flex;gap:4px;align-items:center;padding:3px 0;}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:bounce 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}
.tour-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:890;backdrop-filter:blur(2px);}
.tour-tooltip{position:fixed;background:rgba(8,13,22,.98);border:1px solid rgba(0,229,160,.3);border-radius:16px;padding:20px;max-width:300px;z-index:910;box-shadow:0 8px 40px rgba(0,229,160,.15);animation:fadeInUp .3s ease;}
.tour-step{font-size:10px;font-family:var(--mono);color:var(--accent);letter-spacing:.1em;margin-bottom:8px;}
.tour-title{font-size:16px;font-weight:800;margin-bottom:6px;}
.tour-desc{font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:16px;}
.tour-btns{display:flex;gap:8px;}
.tour-btn{flex:1;padding:9px;border-radius:8px;font-size:12px;font-weight:700;font-family:var(--font);cursor:pointer;border:none;transition:all .15s;}
.tour-next{background:var(--accent);color:#000;}
.tour-skip{background:rgba(255,255,255,.05);color:var(--text2);border:1px solid var(--border2);}
.tour-highlight{position:fixed;border:2px solid var(--accent);border-radius:12px;z-index:895;pointer-events:none;box-shadow:0 0 0 4000px rgba(0,0,0,.75),0 0 24px rgba(0,229,160,.5),0 0 60px rgba(0,229,160,.2);}
.toast{position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-16px);background:rgba(8,13,22,.98);border:1px solid var(--accent);border-radius:12px;padding:11px 20px;font-size:12px;display:flex;align-items:center;gap:8px;opacity:0;transition:all .3s cubic-bezier(.16,1,.3,1);z-index:1000;white-space:nowrap;pointer-events:none;box-shadow:0 6px 32px rgba(0,229,160,.15);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.error{border-color:var(--red);box-shadow:0 6px 32px rgba(255,69,96,.15);}
@media(max-width:900px){.mg4{grid-template-columns:repeat(2,1fr);}.g2{grid-template-columns:1fr;}}
@media(max-width:768px){.sidebar{display:none;}.topbar{display:none;}.main{margin-left:0;}.page-wrap{padding:68px 16px 90px;}.mobile-hdr{display:flex;}.bnav{display:flex;}.ph-title{font-size:20px;}.mc-val{font-size:22px;}.mg4{grid-template-columns:1fr 1fr;}.g2{grid-template-columns:1fr;}}
@media(min-width:769px) and (max-width:1100px){:root{--sidebar:190px;}.mg4{grid-template-columns:repeat(2,1fr);}}
@media(min-width:769px){.modal-overlay{align-items:center;justify-content:center;padding:20px;}.modal-box{max-width:580px;border-radius:20px;max-height:88vh;}.chat-overlay{align-items:flex-end;justify-content:flex-end;}.chat-drawer{width:400px;max-height:580px;border-radius:16px 16px 0 0;margin-right:24px;}}

<body>
<div class="app-grid"></div>
<div class="glow g1"></div><div class="glow g2"></div><div class="glow g3"></div>

<div id="loading"><div class="load-ring"><div class="load-icon-inner">₹</div></div><div class="load-txt">Loading CFO Copilot...</div></div>

<!-- ══ LOGIN ══ -->
<div class="screen auth-screen" id="screen-login">
  <div class="auth-card">
    <div class="a-logo"><div class="a-logo-icon">₹</div><span class="a-logo-name">CFO Copilot</span></div>
    <h1 class="a-title">Welcome 👋</h1>
    <p class="a-sub">Enter your email to get a magic link. No password needed.</p>
    <input class="a-input" type="email" id="login-email" placeholder="you@startup.com" autocomplete="email" onkeydown="if(event.key==='Enter')sendLink()">
    <button class="a-btn" id="link-btn" onclick="sendLink()">✉️ Send Magic Link</button>
    <div class="divider"><div class="divider-line"></div><span class="divider-text">OR</span><div class="divider-line"></div></div>
    <button class="a-btn-ghost" onclick="demoLogin()">🚀 Try Demo — No Signup</button>
    <p class="a-note">By continuing you agree to our <a>Terms</a> and <a>Privacy Policy</a>.</p>
  </div>
</div>

<!-- CHECK EMAIL -->
<div class="screen auth-screen" id="screen-check-email">
  <div class="auth-card" style="text-align:center">
    <div style="font-size:52px;margin-bottom:16px">📬</div>
    <h1 class="a-title" style="text-align:center">Check your email</h1>
    <p class="a-sub" style="text-align:center">Magic link sent to <strong id="sent-to" style="color:var(--accent)"></strong>. Click it to sign in instantly.</p>
    <div style="background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:14px;margin:16px 0;font-size:12px;color:var(--text2);line-height:1.7;text-align:left">💡 <strong style="color:var(--text)">Tip:</strong> Check spam if you don't see it. Link expires in 1 hour.</div>
    <button class="a-btn" onclick="sendLink(true)">↻ Resend Link</button>
    <button class="a-btn-ghost" onclick="showScreen('login')">← Different Email</button>
  </div>
</div>

<!-- ══ ONBOARDING ══ -->
<div class="screen ob-screen" id="screen-onboard">
  <div class="ob-top">
    <div class="ob-logo"><div class="ob-logo-icon">₹</div>CFO Copilot</div>
    <div class="ob-cnt" id="ob-cnt">Step 1 of 4</div>
  </div>
  <div class="prog-track">
    <div class="pdot active" id="pd0">1</div><div class="pline" id="pl0"></div>
    <div class="pdot" id="pd1">2</div><div class="pline" id="pl1"></div>
    <div class="pdot" id="pd2">3</div><div class="pline" id="pl2"></div>
    <div class="pdot" id="pd3">4</div>
  </div>
  <div class="prog-lbls">
    <div class="plbl active" id="pll0">Company</div>
    <div class="plbl" id="pll1">Stage</div>
    <div class="plbl" id="pll2">Founded</div>
    <div class="plbl" id="pll3">Done</div>
  </div>
  <div class="ob-card">
    <!-- Step 0 -->
    <div class="ob-step active" id="obs0">
      <div class="ob-h">Tell us about your startup 🏢</div>
      <div class="ob-p">Your AI CFO learns your context from day one.</div>
      <div class="fl">Company Name</div>
      <input class="fi" type="text" id="ob-company" placeholder="e.g. ZeroPeak Labs" style="margin-bottom:10px">
      <div class="fl">Your Name</div>
      <input class="fi" type="text" id="ob-name" placeholder="e.g. Atharv Roy" style="margin-bottom:14px">
      <div class="fl">Your Role</div>
      <div class="sg">
        <div class="sb on" id="rb0" onclick="pickRole(0,'Founder / CEO')"><div class="sb-e">👑</div><div class="sb-n">Founder / CEO</div></div>
        <div class="sb" id="rb1" onclick="pickRole(1,'Co-Founder')"><div class="sb-e">🤝</div><div class="sb-n">Co-Founder</div></div>
        <div class="sb" id="rb2" onclick="pickRole(2,'CFO / Finance')"><div class="sb-e">📊</div><div class="sb-n">CFO / Finance</div></div>
        <div class="sb" id="rb3" onclick="pickRole(3,'CTO / Tech')"><div class="sb-e">💻</div><div class="sb-n">CTO / Tech</div></div>
      </div>
      <button class="a-btn" style="margin-top:18px" onclick="obNext()">Continue →</button>
    </div>
    <!-- Step 1 -->
    <div class="ob-step" id="obs1">
      <div class="ob-h">What stage are you at? 🚀</div>
      <div class="ob-p">We'll customize benchmarks for your stage.</div>
      <div class="fl">Funding Stage</div>
      <div class="sg">
        <div class="sb" id="stb0" onclick="pickStage(0,'Bootstrapped')"><div class="sb-e">🥾</div><div class="sb-n">Bootstrapped</div><div class="sb-s">Self-funded</div></div>
        <div class="sb" id="stb1" onclick="pickStage(1,'Pre-Seed')"><div class="sb-e">🌱</div><div class="sb-n">Pre-Seed</div><div class="sb-s">₹25L-₹1Cr</div></div>
        <div class="sb on" id="stb2" onclick="pickStage(2,'Seed')"><div class="sb-e">🌿</div><div class="sb-n">Seed</div><div class="sb-s">₹1Cr-₹5Cr</div></div>
        <div class="sb" id="stb3" onclick="pickStage(3,'Series A')"><div class="sb-e">🌳</div><div class="sb-n">Series A</div><div class="sb-s">₹5Cr-₹50Cr</div></div>
        <div class="sb" id="stb4" onclick="pickStage(4,'Series B+')"><div class="sb-e">🏢</div><div class="sb-n">Series B+</div><div class="sb-s">₹50Cr+</div></div>
        <div class="sb" id="stb5" onclick="pickStage(5,'Profitable')"><div class="sb-e">💰</div><div class="sb-n">Profitable</div><div class="sb-s">Cash flow+</div></div>
      </div>
      <div class="fl" style="margin-top:14px">Industry</div>
      <select class="fi" id="ob-industry" style="margin-bottom:16px;cursor:pointer">
        <option value="B2B SaaS" selected>B2B SaaS</option><option>B2C / Consumer App</option>
        <option>FinTech</option><option>EdTech</option><option>HealthTech</option>
        <option>D2C / E-commerce</option><option>DeepTech / AI</option><option>AgriTech</option><option>Other</option>
      </select>
      <button class="a-btn" onclick="obNext()">Continue →</button>
      <div class="skip" onclick="obPrev()">← Back</div>
    </div>
    <!-- Step 2: Founded Date -->
    <div class="ob-step" id="obs2">
      <div class="ob-h">When did you start? 📅</div>
      <div class="ob-p">We'll auto-calculate your compliance filings and missed deadlines.</div>
      <div class="fl">Company Founded Date</div>
      <input class="fi" type="month" id="ob-founded" style="margin-bottom:14px;cursor:pointer">

<script>
// ══════════════════════════════════════
// CONFIG
// ══════════════════════════════════════
const SB_URL  = 'https://qxztwdiccfmryeoqeeue.supabase.co';
const SB_KEY  = 'sb_publishable_hl1wyWw3dLi87BMgoU3tcw_YgWk-So_';
const AI_URL  = `${SB_URL}/functions/v1/ai-chat`;
const REDIRECT = 'https://cnx-stud10s.github.io/cfo-copilot/app.html';
const LIMITS   = { free:5, starter:100, pro:999999, enterprise:999999 };
const PAGE_TITLES = { dashboard:'Dashboard', fundraise:'Fundraising', compliance:'Compliance', ops:'Operations', settings:'Settings' };

const { createClient } = supabase;
const sb = createClient(SB_URL, SB_KEY);

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let S = {
  user: null, company: null, snapshots: [], sub: null,
  isDemo: false,
  // Chat: store ONLY last 6 messages to prevent repetition bug
  chatMsgs: [],
  isSending: false
};

let isSending = false;
let pendingImport = null;

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
async function init() {
  // Safety net - if anything hangs for 5s, show login
  const safetyTimer = setTimeout(() => {
    g('loading').style.display='none';
    showScreen('login');
  }, 5000);

  try {
    if (window.location.hash.includes('access_token')) {
      const { data } = await sb.auth.getSession();
      window.history.replaceState({}, '', window.location.pathname);
      if (data?.session) {
        clearTimeout(safetyTimer);
        await loadApp(data.session.user);
        return;
      }
    }

    const { data: { session } } = await sb.auth.getSession();
    clearTimeout(safetyTimer);

    if (session) await loadApp(session.user);
    else { g('loading').style.display='none'; showScreen('login'); }

    sb.auth.onAuthStateChange(async (event, session) => {
      if (event === 'SIGNED_IN' && session) await loadApp(session.user);
      if (event === 'SIGNED_OUT') {
        S = { user:null, company:null, snapshots:[], sub:null, isDemo:false, chatMsgs:[], isSending:false };
        g('loading').style.display='none';
        showScreen('login');
      }
    });

  } catch(err) {
    clearTimeout(safetyTimer);
    console.warn('Init error:', err);
    g('loading').style.display='none';
    showScreen('login');
  }
}

async function loadApp(user) {
  S.user = user;
  try {
    const [cosRes, snapsRes, subRes] = await Promise.all([
      sb.from('companies').select('*').eq('user_id', user.id).limit(1),
      sb.from('financial_snapshots').select('*').order('month', { ascending:true }),
      sb.from('subscriptions').select('*').eq('user_id', user.id).single()
    ]);
    S.sub = subRes.data;
    if (!cosRes.data?.length) {
      g('loading').style.display='none';
      showScreen('onboard');
      return;
    }
    S.company   = cosRes.data[0];
    S.snapshots = snapsRes.data?.filter(s => s.company_id === S.company.id) || [];
  } catch(err) {
    console.warn('loadApp error:', err);
    // Still proceed - show onboard as fallback
    g('loading').style.display='none';
    showScreen('onboard');
    return;
  }
  g('loading').style.display='none';
  launchApp();
}

// ══════════════════════════════════════
// AUTH
// ══════════════════════════════════════
async function sendLink(resend=false) {
  const email = g('login-email')?.value?.trim();
  if (!email?.includes('@')) { showToast('⚠️ Enter a valid email', true); return; }
  const btn = g('link-btn');
  btn.classList.add('loading'); btn.textContent='Sending...';
  const { error } = await sb.auth.signInWithOtp({ email, options:{ emailRedirectTo:REDIRECT } });
  btn.classList.remove('loading'); btn.textContent='✉️ Send Magic Link';
  if (error) { showToast('❌ '+error.message, true); return; }
  g('sent-to').textContent = email;
  if (!resend) showScreen('check-email');
  else showToast('📧 New magic link sent!');
}

function demoLogin() {
  S = { user:{id:'demo',email:'demo@cfocopilot.in'}, company:{id:'demo',name:'ZeroPeak Labs',stage:'Seed',industry:'B2B SaaS',founded:'2024-04'}, snapshots:demoData(), sub:{plan:'starter',ai_messages_used:12}, isDemo:true, chatMsgs:[], isSending:false };
  g('loading').style.display='none';
  launchApp();
  showToast('🚀 Demo mode — data not saved to DB');
}

async function signOut() {
  if (S.isDemo) { S.isDemo=false; showScreen('login'); return; }
  await sb.auth.signOut();
}

// ══════════════════════════════════════
// ONBOARDING
// ══════════════════════════════════════
let obStep=0, selRole='Founder / CEO', selStage='Seed', hasGST=true;

function pickRole(i,r) { document.querySelectorAll('[id^="rb"]').forEach(b=>b.classList.remove('on')); g('rb'+i).classList.add('on'); selRole=r; }
function pickStage(i,s) { document.querySelectorAll('[id^="stb"]').forEach(b=>b.classList.remove('on')); g('stb'+i).classList.add('on'); selStage=s; }
function pickGST(i,v) { document.querySelectorAll('[id^="gst"]').forEach(b=>b.classList.remove('on')); g('gst'+i).classList.add('on'); hasGST=v; g('gst-num-wrap').style.display=v?'block':'none'; }

function obNext() {
  if (obStep===0 && !g('ob-company').value.trim()) { showToast('⚠️ Enter your company name'); return; }
  if (obStep===2) {
    g('sum-co').textContent=g('ob-company').value.trim();
    g('sum-st').textContent=selStage;
    const fd=g('ob-founded').value;
    g('sum-fd').textContent=fd?new Date(fd+'-01').toLocaleDateString('en-IN',{month:'long',year:'numeric'}):'Not specified';
  }
  obStep++;
  document.querySelectorAll('.ob-step').forEach((s,i)=>s.classList.toggle('active',i===obStep));
  g('ob-cnt').textContent=`Step ${obStep+1} of 4`;
  const total=4;
  for(let i=0;i<total;i++){
    const d=g('pd'+i),l=g('pll'+i);
    if(d){if(i<obStep){d.className='pdot done';d.textContent='✓';l.className='plbl done';}else if(i===obStep){d.className='pdot active';d.textContent=i+1;l.className='plbl active';}else{d.className='pdot';d.textContent=i+1;l.className='plbl';}}
    if(i<total-1&&g('pl'+i))g('pl'+i).className='pline'+(i<obStep?' done':'');
  }
}
function obPrev(){if(obStep>0){obStep-=2;obNext();}}

async function completeOnboarding() {
  const btn=g('launch-btn');
  btn.textContent='Setting up...'; btn.style.opacity='.7'; btn.style.pointerEvents='none';
  const name=g('ob-company').value.trim()||'My Startup';
  const uname=g('ob-name').value.trim()||'Founder';
  const industry=g('ob-industry').value;
  const founded=g('ob-founded').value||null;
  const gstin=hasGST&&g('ob-gstin').value?g('ob-gstin').value.trim():null;

  if (!S.isDemo && S.user) {
    const { data, error } = await sb.from('companies').insert({ user_id:S.user.id, name, stage:selStage, industry, founded, gstin }).select().single();
    if (error) { showToast('❌ '+error.message,true); btn.textContent='🚀 Open My Dashboard'; btn.style.opacity='1'; btn.style.pointerEvents='auto'; return; }
    S.company=data;
    await sb.from('subscriptions').upsert({ user_id:S.user.id, plan:'free', ai_messages_used:0 });
    S.sub={ plan:'free', ai_messages_used:0 };
  } else { S.company={ id:'demo', name, stage:selStage, industry, founded, gstin }; S.sub={ plan:'free', ai_messages_used:0 }; }

  localStorage.setItem('cfo_name', uname);
  localStorage.setItem('cfo_tour_seen', '');
  S.snapshots=[];
  launchApp(true); // true = show tour
}

// ══════════════════════════════════════
// LAUNCH APP
// ══════════════════════════════════════
function launchApp(showTour=false) {
  const name  = localStorage.getItem('cfo_name') || S.user?.email?.split('@')[0] || 'Founder';
  const plan  = S.sub?.plan || 'free';
  const used  = S.sub?.ai_messages_used || 0;
  const limit = LIMITS[plan] || 5;
  const left  = limit===999999 ? '∞' : Math.max(0,limit-used);

  const fields = {
    'sb-avatar':name.slice(0,2).toUpperCase(), 'sb-uname':name.split(' ')[0],
    'sb-uplan':(plan.charAt(0).toUpperCase()+plan.slice(1))+' · '+(limit===999999?'Unlimited':limit+' msgs/mo'),
    'mh-company':S.company?.name||'CFO Copilot',
    'topbar-title':'Dashboard', 'dash-title':S.company?.name||'Dashboard',
    'set-email':S.user?.email||'Demo', 'set-company':S.company?.name||'', 'set-name':name,
    'plan-name':(plan.charAt(0).toUpperCase()+plan.slice(1))+' Plan',
    'plan-desc':limit===999999?'Unlimited AI messages':`${limit} AI messages/month`,
    'usage-text':limit===999999?'∞ msgs':`${left} msgs left`,
    'usage-label':limit===999999?'∞ / Unlimited':`${used} / ${limit}`,
    'chat-usage':limit===999999?'':`${left}/${limit}`,
  };
  Object.entries(fields).forEach(([id,val])=>{ const el=g(id); if(el){ if(el.tagName==='INPUT'||el.tagName==='SELECT')el.value=val; else el.textContent=val; }});
  if(g('usage-bar'))g('usage-bar').style.width=limit===999999?'5%':`${Math.min(100,(used/limit)*100)}%`;
  if(typeof left==='number'&&left<=0)g('limit-banner')?.classList.add('show');

  // Build compliance from founding date
  buildCompliance();
  refreshDashboard();
  buildBoardSlides();
  genUpdate();
  showScreen('app');

  // Show tour for new users
  if (showTour || (!localStorage.getItem('cfo_tour_seen') && !S.isDemo)) {
    setTimeout(()=>startTour(), 800);
  }
}

// ══════════════════════════════════════
// ONBOARDING TOUR
// ══════════════════════════════════════
const TOUR_STEPS = [
  { target:'tour-metrics', title:'Your Key Metrics', desc:'These 4 numbers are your financial heartbeat — runway, burn, cash, and MRR. They update live whenever you add data.', pos:'bottom' },
  { target:'tour-data', title:'Add Your Data', desc:'Click here to manually enter your monthly financials. Takes 2 minutes. Your AI CFO instantly recalculates everything.', pos:'bottom' },
  { target:'tour-import', title:'Import Data', desc:'Already have data in a spreadsheet? Import it here. Our AI reads your CSV or Excel and maps it automatically — no manual entry needed.', pos:'bottom' },
  { target:'tour-chat', title:'Ask Your AI CFO', desc:'Click here anytime to ask questions like "What\'s my runway?", "Should I hire?", or "When should I raise?" in plain English.', pos:'bottom' },
  { target:'snav-compliance', title:'Compliance Calendar', desc:'We auto-generated your GST and TDS filing deadlines based on your founding date. Never miss a filing again.', pos:'right' },
];

let tourStep = 0;

function startTour() {
  tourStep = 0;
  showTourStep();
}

function showTourStep() {
  if (tourStep >= TOUR_STEPS.length) { skipTour(); return; }
  const step = TOUR_STEPS[tourStep];
  const target = g(step.target);
  if (!target) { tourStep++; showTourStep(); return; }

  const rect = target.getBoundingClientRect();
  const pad = 8;

  // Show backdrop
  g('tour-backdrop').style.display = 'block';

  // Highlight target
  const hl = g('tour-highlight');
  hl.style.display = 'block';
  hl.style.left   = (rect.left - pad) + 'px';
  hl.style.top    = (rect.top - pad) + 'px';
  hl.style.width  = (rect.width + pad*2) + 'px';
  hl.style.height = (rect.height + pad*2) + 'px';

  // Position tooltip
  const tt = g('tour-tooltip');
  tt.style.display = 'block';
  g('tour-step-label').textContent = `STEP ${tourStep+1} OF ${TOUR_STEPS.length}`;
  g('tour-title').textContent = step.title;
  g('tour-desc').textContent  = step.desc;
  g('tour-next-btn').textContent = tourStep === TOUR_STEPS.length-1 ? "Finish 🎉" : "Next →";

  // Position tooltip near target
  const ttW = 300, ttH = 180;
  let left, top;
  if (step.pos === 'bottom') {
    left = Math.max(16, Math.min(rect.left, window.innerWidth - ttW - 16));
    top  = rect.bottom + 16;
    if (top + ttH > window.innerHeight) top = rect.top - ttH - 16;
  } else {
    left = rect.right + 16;
    top  = Math.max(16, rect.top);
    if (left + ttW > window.innerWidth) left = rect.left - ttW - 16;
  }
  tt.style.left = left + 'px';
  tt.style.top  = top + 'px';
  tt.style.maxWidth = ttW + 'px';
}

function nextTourStep() {
  tourStep++;
  if (tourStep >= TOUR_STEPS.length) { skipTour(); return; }
  showTourStep();
}

  g('tour-backdrop').style.display = 'none';
  g('tour-highlight').style.display = 'none';

}

// COMPLIANCE — DYNAMIC FROM FOUNDING DATE
// ══════════════════════════════════════
function buildCompliance() {
  const founded = S.company?.founded;
  const now = new Date();
  const currentMonth = now.getMonth(); // 0-indexed
  const currentYear  = now.getFullYear();

  if (!founded) {
    // Show placeholder
    g('comp-filings').innerHTML = '<div style="font-size:12px;color:var(--text3);padding:20px 0;text-align:center">Add your founding date in Settings to generate compliance calendar</div>';
    return;
  }

  const foundedDate = new Date(founded + '-01');
  const monthsSinceFounded = (currentYear - foundedDate.getFullYear()) * 12 + (currentMonth - foundedDate.getMonth());

  // Generate GST filings (GSTR-3B due 20th of following month)
  const filings = [];
  const mos = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // Last 3 months of GSTR-3B
  for (let i = 3; i >= 0; i--) {
    let m = currentMonth - i;
    let y = currentYear;
    if (m < 0) { m += 12; y--; }
    const dueDate = new Date(y, m+1, 20); // Due 20th of next month
    const isOverdue = dueDate < now && i > 0;
    const isFiled = i >= 3;
    const isUpcoming = dueDate > now;

    if (monthsSinceFounded > (3 - i)) {
      filings.push({
        name: `GSTR-3B — ${mos[m]} ${y}`,
        due: `${isOverdue ? 'Was due' : 'Due'}: 20 ${mos[m+1]||mos[0]} ${m+1>11?y+1:y}`,
        status: isFiled ? 'filed' : isOverdue ? 'overdue' : 'upcoming',
        daysLate: isOverdue ? Math.floor((now - dueDate) / 86400000) : 0,
        penalty: isOverdue ? Math.floor((now - dueDate) / 86400000) * 100 : 0
      });
    }
  }

  // TDS Return (quarterly)
  const tdsQuarters = [
    { q:'Q1 FY26', due: new Date(2025,6,31) },
    { q:'Q2 FY26', due: new Date(2025,9,31) },
    { q:'Q3 FY26', due: new Date(2026,0,31) },
    { q:'Q4 FY26', due: new Date(2026,4,31) },
  ];
  tdsQuarters.forEach(tq => {
    if (tq.due > foundedDate) {
      const isOverdue = tq.due < now;
      filings.push({
        name: `TDS Return — ${tq.q}`,
        due: `${isOverdue?'Was due':'Due'}: ${tq.due.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}`,
        status: tq.due < new Date(now - 90*86400000) ? 'filed' : isOverdue ? 'overdue' : 'upcoming',
        daysLate: isOverdue ? Math.floor((now - tq.due) / 86400000) : 0,
        penalty: isOverdue ? Math.floor((now - tq.due) / 86400000) * 150 : 0
      });
    }
  });

  // Count stats
  const overdue  = filings.filter(f=>f.status==='overdue').length;
  const upcoming = filings.filter(f=>f.status==='upcoming').length;
  const filed    = filings.filter(f=>f.status==='filed').length;
  const totalPenalty = filings.reduce((a,f)=>a+f.penalty,0);

  setText('comp-overdue', overdue);
  setText('comp-upcoming', upcoming);
  setText('comp-filed', filed);
  setText('comp-penalty', totalPenalty > 0 ? '₹'+(totalPenalty>1000?(totalPenalty/1000).toFixed(1)+'K':totalPenalty) : '₹0');
  setText('comp-badge', overdue || '');

  if (overdue > 0) { g('comp-dot')?.style && (g('comp-dot').style.display='block'); }

  // Build filings list
  const iconMap = { overdue:'🔴', upcoming:'🔵', filed:'🟢' };
  const tagMap  = { overdue:`<span class="tag tr">${0} days late</span>`, upcoming:`<span class="tag tb">Upcoming</span>`, filed:`<span class="tag tg">Filed ✓</span>` };
  const bgMap   = { overdue:'rgba(255,69,96,.15)', upcoming:'rgba(0,153,255,.15)', filed:'rgba(0,229,160,.15)' };

  g('comp-filings').innerHTML = filings.slice(-8).map(f => `
    <div class="ci">
      <div class="ci-icon" style="background:${bgMap[f.status]}">${iconMap[f.status]}</div>
      <div class="ci-info"><div class="ci-name">${f.name}</div><div class="ci-due">${f.due}</div></div>
      <div class="ci-right">
        ${f.status==='overdue' ? `<span class="tag tr">${f.daysLate} days late</span><button class="btn bgb" style="font-size:10px;padding:5px 10px" onclick="showToast('📧 Add CA email in Settings')">Remind CA</button>` : f.status==='upcoming' ? `<span class="tag tb">${Math.floor((new Date(f.due.split(':')[1])-now)/86400000)||'soon'} days</span>` : `<span class="tag tg">Filed ✓</span>`}
      </div>
    </div>`
  ).join('');

  // Health scores based on actual compliance
  const gstScore = overdue > 0 ? Math.max(40, 100 - overdue * 20) : 95;
  const tdsScore = filings.filter(f=>f.name.includes('TDS')&&f.status==='overdue').length > 0 ? 55 : 90;
  [['ch-gst', gstScore], ['ch-tds', tdsScore], ['ch-roc', 100], ['ch-pf', 90]].forEach(([id, pct]) => {
    setText(id, pct+'%');
    const bar = g(id+'-bar');
    if(bar){bar.style.width=pct+'%';if(pct<70)bar.style.background='linear-gradient(90deg,var(--red),var(--accent3))';}
  });

  // AI insight
  if (overdue > 0) {
    g('comp-ai-text').innerHTML = `<strong>⚠️ ${overdue} overdue filing${overdue>1?'s':''}.</strong> Total penalty: ₹${totalPenalty.toLocaleString()}. File immediately — this also reduces your fundraising score by ${overdue*15} points.`;
  } else {
    g('comp-ai-text').innerHTML = `<strong>Compliance looking good!</strong> No overdue filings. ${upcoming} upcoming in the next 30 days. You're VC-ready on compliance.`;
  }
}

// ══════════════════════════════════════
// CSV/EXCEL IMPORT
// ══════════════════════════════════════
function handleDrop(event) {
  event.preventDefault();
  g('upload-zone').classList.remove('drag');
  const file = event.dataTransfer.files[0];
  if (file) processFile(file);
}

function handleFileUpload(event) {
  const file = event.target.files[0];
  if (file) processFile(file);
}

async function processFile(file) {
  g('import-loading').style.display = 'block';
  g('import-preview').style.display = 'none';

  const ext = file.name.split('.').pop().toLowerCase();

  try {
    let snapshots = [];

    if (ext === 'json') {
      const text = await file.text();
      const data = JSON.parse(text);
      snapshots = data.snapshots || data;
    } else if (ext === 'csv') {
      const text = await file.text();
      snapshots = parseCSV(text);
    } else if (ext === 'xlsx' || ext === 'xls') {
      const buffer = await file.arrayBuffer();
      const workbook = XLSX.read(buffer, { type:'array' });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet);
      snapshots = parseExcelRows(rows);
    }

    if (!snapshots.length) throw new Error('No valid data found');

    pendingImport = snapshots;
    g('import-loading').style.display = 'none';
    g('import-preview').style.display = 'block';
    g('import-summary').innerHTML = `
      <strong style="color:var(--accent)">Found ${snapshots.length} months of data</strong><br>
      Date range: ${snapshots[0].month} → ${snapshots[snapshots.length-1].month}<br>
      MRR range: ₹${Math.min(...snapshots.map(s=>s.mrr||0))}L → ₹${Math.max(...snapshots.map(s=>s.mrr||0))}L<br>
      Latest burn: ₹${snapshots[snapshots.length-1].burn||0}L/mo
    `;
  } catch(e) {
    g('import-loading').style.display = 'none';
    showToast('❌ Could not read file: ' + e.message, true);
  }
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].toLowerCase().split(',').map(h=>h.trim());
  return lines.slice(1).map(line => {
    const vals = line.split(',');
    const row = {};
    headers.forEach((h,i) => row[h] = vals[i]?.trim());
    return mapToSnapshot(row);
  }).filter(s => s.month && (s.mrr || s.burn));
}

function parseExcelRows(rows) {
  return rows.map(row => {
    const r = {};
    Object.entries(row).forEach(([k,v]) => r[k.toLowerCase().trim()] = v);
    return mapToSnapshot(r);
  }).filter(s => s.month && (s.mrr || s.burn));
}

function mapToSnapshot(row) {
  // Smart mapping — handle various column name formats
  const getVal = (...keys) => { for(const k of keys){ const v=row[k]; if(v!==undefined&&v!=='')return parseFloat(v)||0; } return 0; };
  const getMonth = () => {
    const m = row['month']||row['date']||row['period']||'';
    if (m.match(/^\d{4}-\d{2}$/)) return m;
    if (m.match(/^\d{2}\/\d{4}$/)) return m.split('/').reverse().join('-');
    const d = new Date(m);
    if (!isNaN(d)) return d.toISOString().slice(0,7);
    return null;
  };
  return {
    month:     getMonth(),
    mrr:       getVal('mrr','revenue','arr_monthly','monthly_revenue'),
    burn:      getVal('burn','expenses','total_burn','monthly_burn','total_expenses'),
    cash:      getVal('cash','cash_balance','bank_balance','cash_in_bank'),
    salaries:  getVal('salaries','salary','payroll','team_cost'),
    cloud:     getVal('cloud','infra','infrastructure','aws','hosting'),
    marketing: getVal('marketing','ads','marketing_spend'),
    headcount: getVal('headcount','team_size','employees','team'),
    customers: getVal('customers','paying_customers','mrr_customers'),
    nrr:       getVal('nrr','net_revenue_retention','retention'),
  };
}

function calcScenario(){
  const L=S.snapshots.length?S.snapshots[S.snapshots.length-1]:null;
  const bb=L?.burn||42,bm=L?.mrr||28,bc=L?.cash||590;
  const hire=+g('sl-hire').value,mktg=+g('sl-mktg').value,rev=+g('sl-rev').value,churn=+g('sl-churn').value;
  setText('s-hire',hire);setText('s-mktg','₹'+mktg+'L/mo');setText('s-rev',rev+'% MoM');setText('s-churn',churn+'% MoM');
  const nb=bb+hire*2.5+(mktg-5),nr=bm*(1+rev/100),net=Math.max(nb-nr,0.1),rw=(bc/net).toFixed(1);
  const mos=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  setText('sc-burn','₹'+Math.round(nb)+'L');setText('sc-rev-val','₹'+Math.round(nr)+'L');setText('sc-runway',rw+' months');setText('sc-cfp',net<1?'Already CF+':mos[(new Date().getMonth()+Math.ceil(net/(nr*rev/100+0.1)))%12]+' 2026');
}
function loadPreset(t){const p={base:[3,5,22,3],aggressive:[8,15,40,5],conservative:[0,2,12,1]};const[h,m,r,c]=p[t];g('sl-hire').value=h;g('sl-mktg').value=m;g('sl-rev').value=r;g('sl-churn').value=c;calcScenario();showToast('Scenario "'+t+'" loaded');}
function calcHiring(){
  const L=S.snapshots.length?S.snapshots[S.snapshots.length-1]:null;
  const bb=L?.burn||42,bm=L?.mrr||28,bc=L?.cash||590;
  const eng=+g('hl-eng').value,sal=+g('hl-sal').value,rev=+g('hl-rev').value;
  setText('h-eng',eng);setText('h-sal',sal);setText('h-rev','+'+rev+'%');
  const cost=eng*sal,nr=bm*(1+rev/100),nb=bb+cost,net=Math.max(nb-nr,0.1),rw=(bc/net).toFixed(1);
  setText('h-cost','₹'+cost.toFixed(1)+'L/mo');setText('h-runway',rw+' months');setText('h-beven',(cost>0&&nr>bm?(cost/(nr-bm)).toFixed(1):'—')+' months');
  const v=g('h-verdict'),ins=g('h-insight');
  if(+rw<8){v.className='tag tr';v.textContent='🚨 Too risky';ins.innerHTML=`Runway drops to <strong style="color:var(--red)">${rw} months</strong>. Raise first.`;}
  else if(+rw<11){v.className='tag ty';v.textContent='⚠️ Caution';ins.innerHTML=`Runway drops to <strong>${rw} months</strong>. Stagger hires.`;}
  else{v.className='tag tg';v.textContent='✅ Safe to hire';ins.innerHTML=`Hiring ${eng} engineers → <strong>${rw} months</strong> runway. Safe.`;}
}

async function sendMsg() {
  if (isSending) return; // prevent double send
  const inp = g('chat-inp');
  const msg = inp.value.trim();
  if (!msg) return;

  const plan=S.sub?.plan||'free',used=S.sub?.ai_messages_used||0,limit=LIMITS[plan]||5;
  if(used>=limit&&limit!==999999){openModal('upgrade');showToast('⚡ Upgrade to send more AI messages',true);return;}

  // Set sending state
  isSending = true;
  g('chat-send-btn').disabled = true;
  inp.value = '';
  g('chat-chips').style.display = 'none';

  // Add user message to UI
  const msgsEl = g('chat-msgs');
  const uDiv = document.createElement('div');
  uDiv.className = 'cmsg user'; uDiv.textContent = msg;
  msgsEl.appendChild(uDiv);

  // Add to history (keep LAST 6 only to prevent repetition bug)
  S.chatMsgs.push({ role:'user', content:msg });
  if (S.chatMsgs.length > 6) S.chatMsgs = S.chatMsgs.slice(-6);

  // Typing indicator
  const tDiv = document.createElement('div');
  tDiv.className = 'cmsg ai';
  tDiv.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  msgsEl.appendChild(tDiv);
  msgsEl.scrollTop = msgsEl.scrollHeight;

  // Build context with latest financial data
  const L = S.snapshots.length ? S.snapshots[S.snapshots.length-1] : null;
  const runway = L?.burn>0 ? (L.cash*100/L.burn).toFixed(1) : '—';

  // System prompt — always fresh, not accumulated
  const system = `You are the AI CFO for ${S.company?.name||'this startup'} (${S.company?.stage||'Seed'} stage, ${S.company?.industry||'B2B SaaS'}).
${L ? `Current financials: MRR ₹${L.mrr}L, Burn ₹${L.burn}L/mo, Cash ₹${(L.cash/100).toFixed(1)}Cr, Runway ${runway} months, Customers ${L.customers||'?'}, NRR ${L.nrr||'?'}%.` : 'No financial data added yet. Encourage them to add data using the ✏️ Add Data button.'}
${S.company?.founded ? `Founded: ${S.company.founded}.` : ''}
Rules: Be warm, direct, data-driven. Max 3-4 sentences. Use Indian financial context (lakhs, crores, GST, MCA). Answer ONLY the current question. Never repeat previous answers.`;

  try {
    const res = await fetch(AI_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${SB_KEY}`},
      body: JSON.stringify({
        messages: S.chatMsgs, // Only last 6 messages
        system,
        user_id: S.isDemo ? 'demo' : S.user?.id
      })
    });
    const data = await res.json();

    if (res.status === 429 || data.error === 'limit_reached') {
      tDiv.innerHTML = `You've used all <strong>${limit} AI messages</strong> this month. <span style="cursor:pointer;color:var(--accent)" onclick="closeChat();openModal('upgrade')">Upgrade your plan →</span>`;
      g('limit-banner')?.classList.add('show');
    } else if (data.error) {
      throw new Error(data.error);
    } else {
      const reply = data.reply || 'Something went wrong.';
      // Add assistant reply to history
      S.chatMsgs.push({ role:'assistant', content:reply });
      if (S.chatMsgs.length > 6) S.chatMsgs = S.chatMsgs.slice(-6);
      // Update usage
      if (S.sub && data.used !== undefined) {
        S.sub.ai_messages_used = data.used;
        const newLeft = Math.max(0, limit - data.used);
        setText('chat-usage', limit===999999?'':`${newLeft}/${limit}`);
        setText('usage-text', limit===999999?'∞ msgs':`${newLeft} msgs left`);
        if(g('usage-bar'))g('usage-bar').style.width=limit===999999?'5%':`${Math.min(100,(data.used/limit)*100)}%`;
      }
      tDiv.innerHTML = reply.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
    }
  } catch(err) {
    // Smart fallback — always responds to the CURRENT message, never repeats
    const low = msg.toLowerCase();
    let reply;
    if (/^(hi|hello|hey|hii|yo|namaste|sup|good\s*(morning|afternoon|evening))/.test(low))
      reply = `Hey! I'm your AI CFO${S.company?.name?' for '+S.company.name:''}. ${L?`You have <strong>${runway} months of runway</strong> right now. `:'Add your financial data to get started. '}What would you like to know?`;
    else if (/runway|survive|how long|months left/.test(low))
      reply = L ? `Your current runway is <strong>${runway} months</strong> (₹${(L.cash/100).toFixed(1)}Cr cash ÷ ₹${L.burn}L/mo burn). Net burn: ₹${Math.max(L.burn-L.mrr,0).toFixed(1)}L/mo. ${parseFloat(runway)>12?'Healthy position.':'Start fundraising conversations now.'}` : 'Add your cash and burn data to calculate runway.';
    else if (/raise|funding|series|investor|vc/.test(low))
      reply = L ? `Best fundraising window: 12+ months runway and 3+ months of growth. You have <strong>${runway} months</strong> — ${parseFloat(runway)>12?'you have time to build more traction first.':'start conversations now before you need to raise.'}` : 'Add your financial data for specific fundraising advice.';
    else if (/gst|compliance|filing|tds|tax|mca/.test(low))
      reply = S.company?.founded ? `Based on your founding date, I can see your compliance calendar in the Compliance section. Any overdue GST filings need to be filed immediately — they're also reducing your fundraising score.` : `Check your Compliance section for filing deadlines. I auto-calculate these based on your founding date.`;
    else if (/burn|cost|expense|spend/.test(low))
      reply = L ? `Monthly burn: <strong>₹${L.burn}L</strong>${L.salaries?`. Breakdown — Salaries: ₹${L.salaries}L, Cloud: ₹${L.cloud}L, Marketing: ₹${L.marketing}L.`:''} Net burn after revenue: ₹${Math.max(L.burn-L.mrr,0).toFixed(1)}L/mo.` : 'Add your expense data for burn analysis.';
    else if (/hire|team|engineer|headcount/.test(low))
      reply = L ? `Based on ₹${L.burn}L burn and ${runway}mo runway: hiring 3 engineers (~₹7.5L/mo) would reduce runway to ~${(L.cash*100/(L.burn+7.5)).toFixed(1)} months. Check the Hiring Simulator in Operations for detailed analysis.` : 'Add your financial data first to model hiring impact accurately.';
    else if (/mrr|revenue|growth/.test(low))
      reply = L ? `Current MRR: <strong>₹${L.mrr}L</strong>${L.customers?` across ${L.customers} customers`:''}${L.nrr?`. NRR: ${L.nrr}%`:''}.` : 'Add your revenue data to track MRR growth.';
    else
      reply = L ? `For ${S.company?.name||'your startup'} — <strong>₹${(L.cash/100).toFixed(1)}Cr cash, ${runway}mo runway, ₹${L.mrr}L MRR</strong>. ${parseFloat(runway)>12?'You\'re in a solid position.':'Focus on extending runway.'} What specifically can I help with?` : `Add your financial data using the <strong>✏️ Add Data</strong> button to unlock real AI insights.`;

    S.chatMsgs.push({ role:'assistant', content:reply });
    if (S.chatMsgs.length > 6) S.chatMsgs = S.chatMsgs.slice(-6);
    tDiv.innerHTML = reply;
  }

  msgsEl.scrollTop = msgsEl.scrollHeight;
  isSending = false;
  g('chat-send-btn').disabled = false;
}

  const el = g('audit-log');
  if (!el) return;
  if (!auditLog.length) { el.innerHTML = '<div style="font-size:12px;color:var(--text3);padding:20px 0;text-align:center">No activity yet. Actions will be logged here.</div>'; return; }
  el.innerHTML = auditLog.slice(0,20).map(e => {
    const d = new Date(e.ts);
    const time = d.toLocaleDateString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    return `<div class="trow"><div style="font-size:18px">📝</div><div style="flex:1"><div style="font-size:12px;font-weight:600">${e.action}</div><div style="font-size:11px;color:var(--text3);font-family:var(--mono)">${e.details}</div></div><div style="font-size:10px;color:var(--text3);font-family:var(--mono);white-space:nowrap">${time}</div></div>`;
  }).join('');
  // Fraud detection — check for anomalies
  detectFraud();
}

function detectFraud() {
  const el = g('fraud-status');
  if (!el || S.snapshots.length < 2) return;
  const anomalies = [];
  for (let i = 1; i < S.snapshots.length; i++) {
    const curr = S.snapshots[i], prev = S.snapshots[i-1];
    if (curr.burn > prev.burn * 2) anomalies.push(`🚨 Burn doubled in ${curr.month}`);
    if (curr.mrr < prev.mrr * 0.5 && prev.mrr > 0) anomalies.push(`🚨 Revenue dropped 50%+ in ${curr.month}`);
    if (curr.cash > prev.cash * 1.5 && prev.cash > 0) anomalies.push(`⚠️ Cash spiked 50%+ in ${curr.month}`);
  }
  if (anomalies.length) {
    el.className = 'tag tr';
    el.textContent = `⚠️ ${anomalies.length} Anomal${anomalies.length>1?'ies':'y'}`;
    const alertDiv = document.createElement('div');
    alertDiv.style.cssText = 'background:rgba(255,69,96,.08);border:1px solid rgba(255,69,96,.25);border-radius:10px;padding:12px;margin-bottom:12px';
    alertDiv.innerHTML = anomalies.map(a=>`<div style="font-size:12px;color:var(--red);margin-bottom:4px">${a}</div>`).join('');
    g('audit-log').prepend(alertDiv);
  } else {
    el.className = 'tag tg';
    el.textContent = '✓ No Anomalies';
  }
}

function buildPL() {
  const el = g('pl-table');
  if (!el) return;
  if (!S.snapshots.length) { el.innerHTML = '<div style="font-size:12px;color:var(--text3);padding:20px 0;text-align:center">Add financial data to generate P&L</div>'; return; }
  const L = S.snapshots[S.snapshots.length-1];
  const month = new Date().toLocaleDateString('en-IN',{month:'long',year:'numeric'});
  const revenue = L.mrr || 0;
  const cogs = revenue * 0.25;
  const grossProfit = revenue - cogs;
  const grossMargin = revenue > 0 ? ((grossProfit/revenue)*100).toFixed(1) : 0;
  const opex = (L.salaries||0) + (L.cloud||0) + (L.marketing||0);
  const ebitda = grossProfit - opex;
  const depreciation = opex * 0.02;
  const ebit = ebitda - depreciation;
  const tax = ebit > 0 ? ebit * 0.25 : 0;
  const netProfit = ebit - tax;

  const row = (label, val, color='var(--text)', bold=false, indent=false) =>
    `<div style="display:flex;justify-content:space-between;padding:8px ${indent?'14px':'0'};border-bottom:1px solid var(--border)">
      <span style="font-size:${bold?'13':'12'}px;${bold?'font-weight:700;':''}color:var(--text2);${indent?'padding-left:12px;':''}">${label}</span>
      <span style="font-family:var(--mono);font-size:${bold?'14':'12'}px;${bold?'font-weight:700;':''}color:${color}">${val}</span>
    </div>`;

  const fmt = v => (v<0?'-':'')+'₹'+Math.abs(v).toFixed(1)+'L';

  el.innerHTML = `
    <div style="font-size:11px;font-family:var(--mono);color:var(--text3);letter-spacing:.1em;margin-bottom:12px">FOR THE MONTH OF ${month.toUpperCase()}</div>
    ${row('Revenue (MRR)', fmt(revenue), 'var(--accent)', true)}
    ${row('Cost of Revenue (COGS ~25%)', fmt(-cogs), 'var(--red)', false, true)}
    ${row('Gross Profit', fmt(grossProfit), grossProfit>=0?'var(--accent)':'var(--red)', true)}
    ${row(`Gross Margin`, grossMargin+'%', grossMargin>=70?'var(--accent)':grossMargin>=50?'var(--accent4)':'var(--red)')}
    <div style="height:1px;background:var(--border2);margin:8px 0"></div>
    ${row('Salaries & Benefits', fmt(-(L.salaries||0)), 'var(--text2)', false, true)}
    ${row('Cloud & Infrastructure', fmt(-(L.cloud||0)), 'var(--text2)', false, true)}
    ${row('Marketing & Sales', fmt(-(L.marketing||0)), 'var(--text2)', false, true)}
    ${row('Other OpEx', fmt(-(opex-(L.salaries||0)-(L.cloud||0)-(L.marketing||0))), 'var(--text2)', false, true)}
    ${row('Total Operating Expenses', fmt(-opex), 'var(--accent3)', true)}
    <div style="height:1px;background:var(--border2);margin:8px 0"></div>
    ${row('EBITDA', fmt(ebitda), ebitda>=0?'var(--accent)':'var(--red)', true)}
    ${row('Depreciation & Amortization', fmt(-depreciation), 'var(--text2)', false, true)}
    ${row('EBIT', fmt(ebit), ebit>=0?'var(--accent)':'var(--red)', true)}
    ${row('Tax (25% if profitable)', fmt(-tax), 'var(--text2)', false, true)}
    ${row('Net Profit / Loss', fmt(netProfit), netProfit>=0?'var(--accent)':'var(--red)', true)}
  `;
}

function calcUnitEco() {
  const L = S.snapshots.length ? S.snapshots[S.snapshots.length-1] : null;
  const acv    = parseFloat(g('ue-acv')?.value) || (L?.mrr && L?.customers ? L.mrr/L.customers : 0);
  const gm     = parseFloat(g('ue-gm')?.value) || 75;
  const lt     = parseFloat(g('ue-lt')?.value) || 24;
  const mktg   = parseFloat(g('ue-mktg')?.value) || (L?.marketing || 5);
  const newc   = parseFloat(g('ue-newcust')?.value) || 10;

  if (!acv || !newc) return;

  const cac     = newc > 0 ? (mktg / newc) : 0;
  const ltv     = acv * (gm/100) * lt;
  const ratio   = cac > 0 ? (ltv/cac).toFixed(1) : '∞';
  const payback = cac > 0 && acv > 0 ? (cac / (acv * gm/100)).toFixed(1) : '—';
  const magic   = L?.mrr && L?.marketing ? ((L.mrr - (S.snapshots.length>1?S.snapshots[S.snapshots.length-2].mrr:0)) / L.marketing).toFixed(2) : '—';

  setText('ue-cac',   `₹${cac.toFixed(2)}L`);
  setText('ue-ltv',   `₹${ltv.toFixed(2)}L`);
  setText('ue-ratio', `${ratio}x`);
  setText('ue-payback', `${payback} months`);
  setText('ue-margin', `${gm}%`);
  setText('ue-magic',  magic !== '—' ? `${magic}x` : '—');

  // Color code ratio
  const ratioEl = g('ue-ratio');
  if (ratioEl) ratioEl.style.color = parseFloat(ratio) >= 3 ? 'var(--accent)' : parseFloat(ratio) >= 1 ? 'var(--accent4)' : 'var(--red)';

  // Insight
  const ins = g('ue-insight');
  if (ins) {
    if (parseFloat(ratio) >= 3) ins.innerHTML = `<strong>LTV:CAC of ${ratio}x — Excellent!</strong> Industry benchmark is 3x+. You're acquiring customers profitably. CAC payback in ${payback} months.`;
    else if (parseFloat(ratio) >= 1) ins.innerHTML = `<strong>LTV:CAC of ${ratio}x — Needs improvement.</strong> Target 3x+. Either reduce CAC (better targeting) or increase LTV (improve retention or expand revenue per customer).`;
    else ins.innerHTML = `<strong style="color:var(--red)">LTV:CAC below 1x — Burning money per customer.</strong> You spend more acquiring a customer than you earn. Fix this before scaling marketing.`;
  }
}
