<!DOCTYPE html>
<html>
<head>
<style>
body { background: #04070D; color: #00E5A0; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; flex-direction: column; gap: 16px; }
#status { font-size: 14px; color: #8B9AB0; }
</style>
</head>
<body>
<div style="font-size:48px">₹</div>
<div>CFO Copilot</div>
<div id="status">Testing...</div>
<script>
document.getElementById('status').textContent = 'JavaScript works ✅';

// Test Supabase CDN
const s = document.createElement('script');
s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
s.onload = () => { document.getElementById('status').textContent = 'Supabase loaded ✅ — all systems go'; }
s.onerror = () => { document.getElementById('status').textContent = 'Supabase CDN failed ❌ — this is the bug'; }
document.head.appendChild(s);
</script>
</body>
</html>
